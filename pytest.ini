[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    -q
markers =
    protocol: ARINC 429 and ACARS protocol unit tests
    fuzzing: Hypothesis property-based tests
    security: EFB API security and contract tests
    agents: AI agent contract and integration tests
    live: tests requiring ANTHROPIC_API_KEY — skipped in CI without secret
    slow: tests that take more than 2 seconds
