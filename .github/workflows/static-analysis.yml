# SkyGuard — Static Security Analysis (Bandit + Semgrep)
# =========================================================
# Runs on every PR and on a daily schedule.
# Separate from the main pipeline — security scans are slow
# and shouldn't block the fast test feedback loop.
#
# Jobs:
#   bandit-scan   → Python SAST via Bandit (severity HIGH+)
#   semgrep-scan  → Pattern-based SAST via Semgrep OSS (python + security rules)
#   sarif-upload  → Upload results to GitHub Security tab (Code Scanning Alerts)

name: Static Security Analysis

on:
  pull_request:
    branches: ["main", "develop"]
  schedule:
    - cron: "0 3 * * *"       # daily at 03:00 UTC
  workflow_dispatch:

env:
  PYTHON_DEFAULT: "3.12"

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # Bandit — Python SAST
  # ────────────────────────────────────────────────────────────────────────────
  bandit-scan:
    name: "Bandit SAST"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      security-events: write    # needed for SARIF upload

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install Bandit
        run: pip install bandit[sarif]

      - name: Run Bandit (HIGH severity, src/ only)
        run: |
          bandit \
            --recursive src/ \
            --severity-level HIGH \
            --confidence-level MEDIUM \
            --format sarif \
            --output bandit-results.sarif \
            --exit-zero       # don't fail — we expect intentional weaknesses
          # Note: --exit-zero because the EFB simulator intentionally contains
          # vulnerabilities (W2: hardcoded secret, W4: debug endpoint).
          # These are documented as intentional findings, not production code.

      - name: Print Bandit summary (human-readable)
        run: |
          bandit \
            --recursive src/ \
            --severity-level MEDIUM \
            --format text \
            --exit-zero || true

      - name: Upload Bandit SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Upload Bandit SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sarif
          path: bandit-results.sarif
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  # Semgrep — pattern-based SAST
  # ────────────────────────────────────────────────────────────────────────────
  semgrep-scan:
    name: "Semgrep SAST"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      security-events: write

    container:
      image: returntocorp/semgrep

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep (python + security-audit ruleset)
        run: |
          semgrep \
            --config "p/python" \
            --config "p/security-audit" \
            --config "p/owasp-top-ten" \
            --sarif \
            --output semgrep-results.sarif \
            --error \
            --exclude "tests/" \
            src/ || true
          # tests/ excluded — intentional attack payloads would trigger false positives

      - name: Upload Semgrep SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Upload Semgrep SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep-results.sarif
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  # SAST summary — prints a consolidated finding count
  # ────────────────────────────────────────────────────────────────────────────
  sast-summary:
    name: "SAST Summary"
    runs-on: ubuntu-latest
    needs: [bandit-scan, semgrep-scan]
    if: always()

    steps:
      - name: Download SARIF artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-sarif"
          path: sarif-results/
          merge-multiple: true

      - name: Count findings
        run: |
          python3 - <<'EOF'
          import json, pathlib, sys

          total = 0
          for sarif_file in pathlib.Path("sarif-results").glob("*.sarif"):
              try:
                  data = json.loads(sarif_file.read_text())
                  for run in data.get("runs", []):
                      results = run.get("results", [])
                      total += len(results)
                      tool = run.get("tool", {}).get("driver", {}).get("name", "?")
                      print(f"  {tool}: {len(results)} finding(s)")
              except Exception as e:
                  print(f"  Could not parse {sarif_file.name}: {e}")

          print(f"\nTotal SAST findings: {total}")
          print("Note: intentional weaknesses W2 (hardcoded secret) and W4 (debug endpoint)")
          print("      are expected and documented in ADR-003.")
          EOF
