# SkyGuard — Docker Compose
# ===========================
# Starts the full local environment in one command:
#   docker compose up --build
#
# Services:
#   efb-api      Flask EFB simulator  → http://localhost:5050
#   rabbitmq     Message broker UI    → http://localhost:15672  (skyguard/skyguard)
#
# Prerequisites:
#   - Docker Desktop (Windows/Mac) or Docker Engine (Linux)
#   - Copy .env.example to .env (ANTHROPIC_API_KEY optional)
#
# Windows note: run from PowerShell or Windows Terminal, NOT Git Bash

services:

  # ── EFB API simulator ──────────────────────────────────────────────────────
  efb-api:
    build:
      context: .
      dockerfile: Dockerfile.efb
    container_name: skyguard-efb
    ports:
      - "5050:5050"
    environment:
      FLASK_ENV: development
      FLASK_APP: src/simulators/efb_api/efb_app.py
      PYTHONPATH: /app
    networks:
      - skyguard-net
    restart: unless-stopped

  # ── RabbitMQ event broker ──────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: skyguard-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: skyguard
      RABBITMQ_DEFAULT_PASS: skyguard
      RABBITMQ_DEFAULT_VHOST: skyguard
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - skyguard-net
    restart: unless-stopped

networks:
  skyguard-net:
    driver: bridge

volumes:
  rabbitmq-data:
